spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: ${CXSEARCH_DATASOURCE_URL:jdbc:mysql://localhost:3306/cxsearch?useUnicode=true&characterEncoding=utf8&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true}
    username: ${CXSEARCH_DATASOURCE_USERNAME:cxsearch}
    password: ${CXSEARCH_DATASOURCE_PASSWORD:cxsearch}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
