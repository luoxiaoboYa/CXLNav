server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: cxsearch-backend
  datasource:
    url: ${CXSEARCH_DATASOURCE_URL:jdbc:h2:mem:cxsearch;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${CXSEARCH_DATASOURCE_USERNAME:sa}
    password: ${CXSEARCH_DATASOURCE_PASSWORD:}
    driver-class-name: ${CXSEARCH_DATASOURCE_DRIVER:org.h2.Driver}
  flyway:
    enabled: false
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
