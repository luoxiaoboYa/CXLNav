openapi: 3.0.3
info:
  title: CXSearch API
  version: 0.1.0
  description: CXSearch MVP OpenAPI draft. Details are based on docs/CXSearch-api-contract.md.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: PersonalSites
  - name: Taxonomy
  - name: Search
  - name: Recommendations
  - name: ShareApplications
  - name: ImportsExports
  - name: PluginSync
  - name: Governance
paths:
  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AuthResponse' } } } }
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AuthResponse' } } } }
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { user: { $ref: '#/components/schemas/User' } } } } } }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      responses:
        '200': { $ref: '#/components/responses/Success' }
  /personal-sites:
    get:
      tags: [PersonalSites]
      summary: List personal sites
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - { name: keyword, in: query, schema: { type: string } }
        - { name: categoryId, in: query, schema: { type: string } }
        - { name: bookmarkPathId, in: query, schema: { type: string } }
        - { name: archiveStatus, in: query, schema: { $ref: '#/components/schemas/ArchiveStatus' } }
        - { name: securityStatus, in: query, schema: { $ref: '#/components/schemas/SecurityStatus' } }
        - { name: organizeStatus, in: query, schema: { $ref: '#/components/schemas/OrganizeStatus' } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PersonalSiteListResponse' } } } }
    post:
      tags: [PersonalSites]
      summary: Create personal site
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PersonalSiteInput' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/CreatePersonalSiteResponse' } } } }
  /personal-sites/{siteId}:
    parameters:
      - { $ref: '#/components/parameters/SiteId' }
    get:
      tags: [PersonalSites]
      summary: Get personal site detail
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { site: { $ref: '#/components/schemas/PersonalSite' }, recommendationInfo: { type: object, nullable: true }, validationLatest: { type: object, nullable: true } } } } } }
    patch:
      tags: [PersonalSites]
      summary: Update personal site
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PersonalSiteInput' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { site: { $ref: '#/components/schemas/PersonalSite' } } } } } }
    delete:
      tags: [PersonalSites]
      summary: Delete personal site
      parameters:
        - { name: confirmShared, in: query, schema: { type: boolean, default: false } }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '409': { $ref: '#/components/responses/Error' }
  /personal-sites/{siteId}/archive:
    post:
      tags: [PersonalSites]
      parameters: [{ $ref: '#/components/parameters/SiteId' }]
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /personal-sites/{siteId}/restore:
    post:
      tags: [PersonalSites]
      parameters: [{ $ref: '#/components/parameters/SiteId' }]
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /personal-sites/{siteId}/open:
    post:
      tags: [PersonalSites]
      parameters: [{ $ref: '#/components/parameters/SiteId' }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { url: { type: string }, lastOpenedAt: { type: string, format: date-time } } } } } }
  /personal-sites/{siteId}/recheck:
    post:
      tags: [PersonalSites]
      parameters: [{ $ref: '#/components/parameters/SiteId' }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RecheckResponse' } } } }
  /categories:
    get:
      tags: [Taxonomy]
      parameters: [{ $ref: '#/components/parameters/Scope' }]
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/CategoryListResponse' } } } } }
    post:
      tags: [Taxonomy]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/CategoryInput' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { category: { $ref: '#/components/schemas/Category' } } } } } } }
  /categories/{categoryId}:
    parameters: [{ name: categoryId, in: path, required: true, schema: { type: string } }]
    patch:
      tags: [Taxonomy]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/CategoryInput' } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
    delete:
      tags: [Taxonomy]
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /tags:
    get:
      tags: [Taxonomy]
      parameters: [{ $ref: '#/components/parameters/Scope' }]
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TagListResponse' } } } } }
    post:
      tags: [Taxonomy]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/TagInput' } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /tags/{tagId}:
    parameters: [{ name: tagId, in: path, required: true, schema: { type: string } }]
    patch:
      tags: [Taxonomy]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/TagInput' } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
    delete:
      tags: [Taxonomy]
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /tags/merge:
    post:
      tags: [Taxonomy]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [sourceTagIds, targetTagId]
              properties:
                sourceTagIds: { type: array, items: { type: string } }
                targetTagId: { type: string }
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /bookmark-paths:
    get:
      tags: [Taxonomy]
      parameters: [{ name: categoryId, in: query, schema: { type: string } }]
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/BookmarkPathListResponse' } } } } }
    post:
      tags: [Taxonomy]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/BookmarkPathInput' } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /bookmark-paths/{pathId}:
    parameters: [{ name: pathId, in: path, required: true, schema: { type: string } }]
    patch:
      tags: [Taxonomy]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/BookmarkPathInput' } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
    delete:
      tags: [Taxonomy]
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /bookmark-paths/move:
    post:
      tags: [Taxonomy]
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /bookmark-paths/merge:
    post:
      tags: [Taxonomy]
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /search:
    get:
      tags: [Search]
      summary: Global search
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: scope, in: query, schema: { type: string, enum: [all, personal, recommendation], default: all } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/SearchResponse' } } } }
  /organize-tasks:
    get:
      tags: [Search]
      parameters:
        - { name: type, in: query, schema: { $ref: '#/components/schemas/OrganizeTaskType' } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OrganizeTaskListResponse' } } } } }
  /organize-tasks/duplicates/resolve:
    post:
      tags: [Search]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/ResolveDuplicatesRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /recommendations:
    get:
      tags: [Recommendations]
      summary: List published recommendations
      parameters:
        - { name: keyword, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { $ref: '#/components/schemas/RecommendationType' } }
        - { name: categoryId, in: query, schema: { type: string } }
        - { name: sort, in: query, schema: { type: string, enum: [hot, latest, favorite_count, open_count], default: hot } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RecommendationListResponse' } } } } }
  /recommendations/{recommendationId}:
    get:
      tags: [Recommendations]
      parameters: [{ $ref: '#/components/parameters/RecommendationId' }]
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RecommendationDetailResponse' } } } } }
  /recommendations/{recommendationId}/collect:
    post:
      tags: [Recommendations]
      parameters: [{ $ref: '#/components/parameters/RecommendationId' }]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/CollectRecommendationRequest' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/CollectRecommendationResponse' } } } } }
  /recommendations/{recommendationId}/open:
    post:
      tags: [Recommendations]
      parameters: [{ $ref: '#/components/parameters/RecommendationId' }]
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { url: { type: string } } } } } } }
  /recommendations/{recommendationId}/reasons:
    get:
      tags: [Recommendations]
      parameters: [{ $ref: '#/components/parameters/RecommendationId' }]
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/RecommendationReason' } }, total: { type: integer } } } } } } }
  /recommendations/{recommendationId}/my-reason:
    put:
      tags: [Recommendations]
      parameters: [{ $ref: '#/components/parameters/RecommendationId' }]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/UpsertReasonRequest' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { reason: { $ref: '#/components/schemas/RecommendationReason' } } } } } } }
    delete:
      tags: [Recommendations]
      parameters: [{ $ref: '#/components/parameters/RecommendationId' }]
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /share-applications/precheck:
    post:
      tags: [ShareApplications]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/SharePrecheckRequest' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/SharePrecheckResponse' } } } } }
  /share-applications:
    get:
      tags: [ShareApplications]
      parameters:
        - { name: status, in: query, schema: { $ref: '#/components/schemas/ShareApplicationStatus' } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ShareApplicationListResponse' } } } } }
    post:
      tags: [ShareApplications]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/CreateShareApplicationRequest' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { application: { $ref: '#/components/schemas/ShareApplication' } } } } } } }
  /share-applications/{applicationId}:
    parameters: [{ $ref: '#/components/parameters/ApplicationId' }]
    get:
      tags: [ShareApplications]
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { application: { $ref: '#/components/schemas/ShareApplication' } } } } } } }
    patch:
      tags: [ShareApplications]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/CreateShareApplicationRequest' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { application: { $ref: '#/components/schemas/ShareApplication' } } } } } } }
  /share-applications/{applicationId}/submit:
    post:
      tags: [ShareApplications]
      parameters: [{ $ref: '#/components/parameters/ApplicationId' }]
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { application: { $ref: '#/components/schemas/ShareApplication' } } } } } } }
  /share-applications/{applicationId}/withdraw:
    post:
      tags: [ShareApplications]
      parameters: [{ $ref: '#/components/parameters/ApplicationId' }]
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { application: { $ref: '#/components/schemas/ShareApplication' } } } } } } }
  /imports/bookmarks/parse:
    post:
      tags: [ImportsExports]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties: { file: { type: string, format: binary } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/BookmarkParseResponse' } } } } }
  /imports/bookmarks/confirm:
    post:
      tags: [ImportsExports]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/ConfirmBookmarkImportRequest' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { importTask: { $ref: '#/components/schemas/ImportTask' } } } } } } }
  /imports:
    get:
      tags: [ImportsExports]
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ImportTaskListResponse' } } } } }
  /imports/{importTaskId}:
    get:
      tags: [ImportsExports]
      parameters: [{ name: importTaskId, in: path, required: true, schema: { type: string } }]
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { importTask: { $ref: '#/components/schemas/ImportTask' }, items: { type: array, items: { $ref: '#/components/schemas/ImportItem' } } } } } } } }
  /exports/bookmarks.html:
    get:
      tags: [ImportsExports]
      parameters: [{ name: mode, in: query, schema: { type: string, enum: [current_structure, original_structure, flat_by_category], default: current_structure } }]
      responses: { '200': { description: Bookmark HTML, content: { text/html: { schema: { type: string } } } } }
  /exports/cxsearch.json:
    get:
      tags: [ImportsExports]
      responses: { '200': { description: CXSearch JSON backup, content: { application/json: { schema: { type: object } } } } }
  /imports/cxsearch-json:
    post:
      tags: [ImportsExports]
      requestBody: { content: { multipart/form-data: { schema: { type: object, properties: { file: { type: string, format: binary } } } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /sync/plugin:
    post:
      tags: [PluginSync]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/PluginSyncRequest' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PluginSyncResponse' } } } } }
  /sync/plugin/bootstrap:
    get:
      tags: [PluginSync]
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PluginBootstrapResponse' } } } } }
  /reports:
    post:
      tags: [Governance]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/CreateReportRequest' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { reportId: { type: string } } } } } } }
  /reports/my:
    get:
      tags: [Governance]
      responses: { '200': { $ref: '#/components/responses/Paged' } }
  /url-validations:
    get:
      tags: [Governance]
      parameters:
        - { name: targetType, in: query, schema: { type: string } }
        - { name: targetId, in: query, schema: { type: string } }
      responses: { '200': { $ref: '#/components/responses/Paged' } }
  /url-validations/recheck:
    post:
      tags: [Governance]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [targetType, targetId]
              properties: { targetType: { type: string }, targetId: { type: string } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RecheckResponse' } } } } }
  /admin/reviews:
    get:
      tags: [Governance]
      parameters:
        - { name: targetType, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
      responses: { '200': { $ref: '#/components/responses/Paged' } }
  /admin/reviews/{targetType}/{targetId}/approve:
    post:
      tags: [Governance]
      parameters: [{ $ref: '#/components/parameters/TargetType' }, { $ref: '#/components/parameters/TargetId' }]
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /admin/reviews/{targetType}/{targetId}/reject:
    post:
      tags: [Governance]
      parameters: [{ $ref: '#/components/parameters/TargetType' }, { $ref: '#/components/parameters/TargetId' }]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/AdminReasonRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /admin/reviews/{targetType}/{targetId}/hide:
    post:
      tags: [Governance]
      parameters: [{ $ref: '#/components/parameters/TargetType' }, { $ref: '#/components/parameters/TargetId' }]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/AdminReasonRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /admin/reviews/{targetType}/{targetId}/restore:
    post:
      tags: [Governance]
      parameters: [{ $ref: '#/components/parameters/TargetType' }, { $ref: '#/components/parameters/TargetId' }]
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /admin/recommendations/{recommendationId}/remove:
    post:
      tags: [Governance]
      parameters: [{ $ref: '#/components/parameters/RecommendationId' }]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/AdminReasonRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /admin/recommendations/merge:
    post:
      tags: [Governance]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [sourceRecommendationId, targetRecommendationId, reason]
              properties:
                sourceRecommendationId: { type: string }
                targetRecommendationId: { type: string }
                reason: { type: string }
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /admin/risk-domains:
    get:
      tags: [Governance]
      responses: { '200': { $ref: '#/components/responses/Paged' } }
    post:
      tags: [Governance]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/RiskDomainInput' } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /admin/risk-domains/{domainId}:
    parameters: [{ name: domainId, in: path, required: true, schema: { type: string } }]
    patch:
      tags: [Governance]
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/RiskDomainInput' } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
    delete:
      tags: [Governance]
      responses: { '200': { $ref: '#/components/responses/Success' } }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page: { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
    PageSize: { name: pageSize, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
    Scope: { name: scope, in: query, schema: { $ref: '#/components/schemas/Scope' } }
    SiteId: { name: siteId, in: path, required: true, schema: { type: string } }
    RecommendationId: { name: recommendationId, in: path, required: true, schema: { type: string } }
    ApplicationId: { name: applicationId, in: path, required: true, schema: { type: string } }
    TargetType: { name: targetType, in: path, required: true, schema: { type: string } }
    TargetId: { name: targetId, in: path, required: true, schema: { type: string } }
  responses:
    Success: { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/SuccessResponse' } } } }
    Error: { description: Error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
    Paged: { description: Paged result, content: { application/json: { schema: { $ref: '#/components/schemas/PagedResponse' } } } }
  schemas:
    Scope: { type: string, enum: [personal, public] }
    SecurityStatus: { type: string, enum: [unchecked, checking, safe, unreachable, risky, blocked] }
    OrganizeStatus: { type: string, enum: [complete, missing_description, missing_tags, path_pending, duplicate_suspected, stale, link_problem] }
    ArchiveStatus: { type: string, enum: [active, archived, deleted] }
    PersonalSiteSource: { type: string, enum: [manual, plugin, browser_import, recommendation, json_restore] }
    ShareStatus: { type: string, enum: [none, draft, pending, published, rejected, removed] }
    RecommendationType: { type: string, enum: [main_site, feature_site] }
    PublishStatus: { type: string, enum: [draft, pending_review, published, hidden, removed, merged] }
    ShareApplicationStatus: { type: string, enum: [draft, validating, validation_failed, pending_review, rejected, published, withdrawn, removed] }
    ValidationStatus: { type: string, enum: [not_started, checking, passed, failed] }
    DisplayMode: { type: string, enum: [real_name, anonymous] }
    OrganizeTaskType: { type: string, enum: [missing_description, missing_tags, duplicate_suspected, link_problem, path_pending, stale, archived] }
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        nickname: { type: string }
        avatarUrl: { type: string, nullable: true }
        role: { type: string, enum: [user, admin] }
        status: { type: string, enum: [active, disabled, deleted] }
        createdAt: { type: string, format: date-time }
    RegisterRequest:
      type: object
      required: [email, password, nickname]
